{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-4 p-4 text-center">
                <i class="fas fa-user-lock fa-3x text-warning mb-3"></i>
                <h3 class="fw-bold">Security Verification</h3>
                <p class="text-muted">We've sent a 6-digit security code to your current registered email. Enter it below to unlock profile editing.</p>
                <form method="post">
                    {% csrf_token %}
                    <input type="text" name="otp" class="form-control form-control-lg text-center fw-bold mb-4" placeholder="000000" maxlength="6" required>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold">Verify Identity</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
